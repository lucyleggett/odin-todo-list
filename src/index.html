<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="tasks-dashboard">
            <div class="title-bar">
                <h1>Tasks</h1>
                <div class="buttons">
                    <button class="filter"><img src="./images/filter-svgrepo-com.svg" alt="Three horizontal lines decreasing in width"></button>
                    <button class="new-task"><img src="./images/plus-svgrepo-com.svg" alt="Plus sign"></button>
                </div>
            </div>
            <div class="tasks-container"></div>
        </div>
        <div class="projects-dashboard">
            <div class="title-bar">
                <h1>Projects</h1>
                <div class="buttons">
                    <button class="filter"><img src="./images/filter-svgrepo-com.svg" alt="Three horizontal lines decreasing in width"></button>
                    <button class="new-project"><img src="./images/plus-svgrepo-com.svg" alt="Plus sign"></button>
                </div>
            </div>
            <div class="projects-container"></div>
        </div>
    </div>
</body>
</html>
