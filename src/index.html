<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="tasks-dashboard">
            <div class="title-bar">
                <button class="menu">
                    <h1>Tasks</h1>
                    <img src="./images/dropdown-arrow-svgrepo-com.svg" alt="Small arrow pointing downwards">
                </button>
                <div class="buttons">
                    <button class="filter"><img src="./images/filter-svgrepo-com.svg" alt="Three horizontal lines decreasing in width"></button>
                    <button class="new-task"><img src="./images/plus-svgrepo-com.svg" alt="Plus sign"></button>
                </div>
            </div>
            <div class="filter-menu">
                <h4>Filter by</h4>
                <button class="apply-filter-btn">Apply</button>
                    <div class="priority filter-subcat">
                        <h5>Priority</h5>
                            <div class="filter"><label><input type="checkbox" name="priority" value="high">High</label></div>
                            <div class="filter"><label><input type="checkbox" name="priority" value="medium">Medium</label></div>
                            <div class="filter"><label><input type="checkbox" name="priority" value="low">Low</label></div>
                    </div>
                    <div class="project filter-subcat">
                        <h5>Project</h5>
                            <div class="filter"><label><input type="checkbox" name="project" value="x">X</label></div>
                            <div class="filter"><label><input type="checkbox" name="project" value="y">Y</label></div>
                            <div class="filter"><label><input type="checkbox" name="project" value="z">Z</label></div>
                    </div>
                    <div class="status filter-subcat">
                        <h5>Status</h5>
                            <div class="filter"><label><input type="checkbox" name="status" value="pending">Pending</label></div>
                            <div class="filter"><label><input type="checkbox" name="status" value="complete">Complete</label></div>
                    </div>
            </div>
            <div class="dropdown"></div>
            <div class="tasks-container"></div>
        </div>
        <div class="projects-dashboard">
            <div class="title-bar">
                <h1>Projects</h1>
                <div class="buttons">
                    <button class="filter"><img src="./images/filter-svgrepo-com.svg" alt="Three horizontal lines decreasing in width"></button>
                    <button class="new-project"><img src="./images/plus-svgrepo-com.svg" alt="Plus sign"></button>
                </div>
            </div>
            <div class="projects-container"></div>
        </div>
    </div>
</body>
</html>
