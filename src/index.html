<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="tasks-dashboard">
            <div class="title-bar">
                <h1>Tasks</h1>
                <div class="buttons">
                    <button><img src="./images/filter-svgrepo-com.svg" alt="Three horizontal lines decreasing in width" class="filter"></button>
                    <button><img src="./images/plus-svgrepo-com.svg" alt="Plus sign" class="newTask"></button>
                </div>
            </div>
            <div class="tasks-container"></div>
        </div>
        <div class="projects-dashboard">
            <div class="title-bar">
                <h1>Projects</h1>
                <div class="buttons">
                    <button><img src="./images/filter-svgrepo-com.svg" alt="Three horizontal lines decreasing in width" class="filter"></button>
                    <button><img src="./images/plus-svgrepo-com.svg" alt="Plus sign" class="newProject"></button>
                </div>
            </div>
            <div class="projects-container"></div>
        </div>
        <div class="task-form-container disabled">
            <form id="newTaskForm"  action="" method="get">
                <div class="form-row">
                    <label for="taskTitle">Title</label>
                    <input id="taskTitle" name="taskTitle" type="text" placeholder="Title"/>
                </div>
                <div class="form-row">
                    <label for="taskDesc">Description</label>
                    <textarea id="taskDesc" name="taskDesc" rows="1" placeholder="Description"></textarea>
                </div>
                <div class="form-row">
                    <p>☑️</p>
                    <input type="text" id="itemInput" placeholder="Add checklist item...">
                    <button id="addBtn">+</button>
                </div>
                <ul id="checklist-one"></ul>
                <div class="vertical-container">
                    <div class="form-row">
                        <label for="taskDueDate">Due Date</label>
                        <input id="taskDueDate" name="taskDueDate" type="date"/>
                    </div>
                    <div class="form-row">
                    <label for="taskPriority">Priority</label>
                    <select name="taskPriority" id="taskPriority">
                        <option value="Low">💆 Low</option>
                        <option value="Medium">🔔 Medium</option>
                        <option value="High">❗️ High</option>
                    </select>
                    </div>
                </div>
                <div class="submit-project form-row">
                    <p>Add task to...</p>
                    <div class="submit-buttons">
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
